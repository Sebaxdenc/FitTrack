<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FITtrack | Bienvenido</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0c1016;
      --panel: #141a24;
      --muted: #9aa3b5;
      --accent: #21e36b;
      --accent-2: #00c4ff;
      --shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
      --radius: 18px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Manrope', system-ui, -apple-system, sans-serif;
      background: radial-gradient(120% 120% at 20% 20%, rgba(0, 196, 255, 0.12), transparent 45%),
                  radial-gradient(120% 120% at 80% 0%, rgba(33, 227, 107, 0.12), transparent 40%),
                  var(--bg);
      color: #f5f7fb;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 18px 48px;
    }

    .shell {
      width: min(900px, 100%);
      background: linear-gradient(150deg, rgba(33, 227, 107, 0.22), rgba(12, 16, 22, 0.9));
      border-radius: 24px;
      padding: 32px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .top {
      display: flex;
      gap: 18px;
      align-items: center;
    }

    .logo-mark {
      width: 60px;
      height: 60px;
      border-radius: 18px;
      background: linear-gradient(140deg, #21e36b, #00c4ff);
      display: grid;
      place-items: center;
      font-weight: 800;
      color: #0c1016;
      font-family: 'Space Grotesk', 'Manrope', sans-serif;
      letter-spacing: -1px;
      font-size: 22px;
    }

    h1 {
      margin: 0;
      font-size: 32px;
      letter-spacing: -0.6px;
      font-weight: 800;
    }

    .subtitle {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 15px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
      margin-top: 22px;
    }

    .card {
      background: rgba(255, 255, 255, 0.04);
      border-radius: var(--radius);
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 18px;
      box-shadow: var(--shadow);
    }

    .card h2 { margin: 0 0 8px; font-size: 18px; }
    .card p { margin: 0 0 14px; color: var(--muted); font-size: 14px; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: none;
      cursor: pointer;
      padding: 12px 16px;
      border-radius: 14px;
      font-weight: 800;
      letter-spacing: 0.2px;
      transition: transform 0.12s ease, box-shadow 0.2s ease;
      text-decoration: none;
      font-size: 14px;
    }

    .btn-primary {
      background: linear-gradient(120deg, #21e36b, #00c4ff);
      color: #0c1016;
      box-shadow: 0 10px 25px rgba(0, 196, 255, 0.25);
    }

    .btn-secondary {
      background: transparent;
      color: #f5f7fb;
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .btn:hover { transform: translateY(-1px); }
  </style>
</head>
<body>
  <main class="shell">
    <div class="top">
      <div class="logo-mark">FT</div>
      <div>
        <h1>FITtrack</h1>
        <p class="subtitle">Tu hub para rutinas, comidas y progreso.</p>
      </div>
    </div>

    <div class="grid">
      <section class="card">
        <h2>Inicia sesión</h2>
        <p>Vuelve a tus planes, rutinas y favoritos.</p>
        <a class="btn btn-primary" href="/login/">Iniciar sesión</a>
      </section>
      <section class="card">
        <h2>Regístrate</h2>
        <p>Crea tu cuenta para guardar tu progreso y comidas.</p>
        <a class="btn btn-secondary" href="/register/">Crear cuenta</a>
      </section>
    </div>
  </main>
</body>
</html>
