version: '3.9'

services:
  web:
    build: .
    command: sh -c "
              python manage.py migrate &&
              python manage.py collectstatic --noinput &&
              gunicorn config.wsgi:application --bind 0.0.0.0:8000
              "
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fittrack}
      POSTGRES_USER: ${POSTGRES_USER:-fittrack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fittrack}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
